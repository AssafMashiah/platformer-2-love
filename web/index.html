<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Platformer - Survive the Onslaught</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        #game-canvas {
            border: 4px solid #e94560;
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(233, 69, 96, 0.5);
        }
        .loading {
            color: #e94560;
            font-size: 24px;
            text-align: center;
        }
        .controls {
            color: #eee;
            background: rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 8px;
            max-width: 800px;
        }
        .controls h3 {
            color: #e94560;
            margin-bottom: 10px;
        }
        .controls ul {
            list-style: none;
            padding: 0;
        }
        .controls li {
            padding: 5px 0;
        }
        .controls strong {
            color: #e94560;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div class="loading" id="loading">Loading game...</div>
        <canvas id="game-canvas"></canvas>
        <div class="controls">
            <h3>Controls</h3>
            <ul>
                <li><strong>WASD / Arrow Keys</strong> - Move character</li>
                <li><strong>W / Up / Space</strong> - Jump (also shoots when in air)</li>
                <li><strong>Space</strong> - Shoot in the direction you're facing</li>
                <li><strong>P / Escape</strong> - Pause/Resume game</li>
            </ul>
        </div>
    </div>
    <script>
        var Module = {
            canvas: (function() {
                var canvas = document.getElementById("game-canvas");
                canvas.width = 800;
                canvas.height = 600;
                return canvas;
            })(),
            setStatus: function(text) {
                if (text) {
                    document.getElementById("loading").textContent = text;
                } else {
                    document.getElementById("loading").style.display = "none";
                }
            },
            totalDependencies: 0,
            monitorRunDependencies: function(left) {
                this.totalDependencies = left;
            }
        };
        window.onerror = function(event) {
            console.error(event);
        };
    </script>
    <script src="game.js"></script>
</body>
</html>
